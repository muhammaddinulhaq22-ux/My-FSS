<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY FSS - SUPREME DATABASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0ea5e9; --bg: #030712; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .glass-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; margin-bottom: 12px; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; font-size: 12px; width: 100%; padding: 10px; border-radius: 10px; }
        .tab-content { display: none; }
        .active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { opacity: 0.5; font-size: 10px; font-weight: 800; text-transform: uppercase; min-width: 60px; flex-shrink: 0; padding-bottom: 5px; }
        .nav-btn.active-nav { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-32">

    <header class="flex justify-between items-center p-6 glass rounded-[2rem] mb-6 sticky top-4 z-50">
        <div>
            <h1 class="font-cyber font-black text-sky-400 text-xl italic uppercase">MY FSS</h1>
            <p class="text-[7px] text-slate-500 font-bold tracking-[0.3em] uppercase">Integrated Database v15.0</p>
        </div>
        <img src="https://image2url.com/r2/default/images/1771594263411-101529ae-f253-4b02-a479-b0993ada9260.png" class="w-10 h-10">
    </header>

    <nav class="flex gap-4 mb-8 overflow-x-auto no-scrollbar pb-2 sticky top-28 z-40 bg-transparent px-1">
        <button onclick="buka('home')" id="btn-home" class="nav-btn active-nav">Home</button>
        <button onclick="buka('mil')" id="btn-mil" class="nav-btn">Mil</button>
        <button onclick="buka('eco')" id="btn-eco" class="nav-btn">Eco</button>
        <button onclick="buka('poll')" id="btn-poll" class="nav-btn">Poll</button>
        <button onclick="buka('news')" id="btn-news" class="nav-btn">News</button>
        <button onclick="buka('rules')" id="btn-rules" class="nav-btn">Rules</button>
    </nav>

    <section id="home" class="tab-content active">
        <div class="glass overflow-hidden border-b-4 border-sky-500 rounded-3xl">
            <img src="https://image2url.com/r2/default/images/1772618603013-743dc03a-780e-43b6-9825-dfe0ffab9d7c.jpg" class="w-full h-52 object-cover">
            <div class="p-6 text-center">
                <h2 class="font-cyber text-white text-md font-black mb-3 uppercase italic">SELAMAT DATANG DI MY FSS</h2>
                <p class="text-[11px] text-slate-400 leading-relaxed mb-6">Pusat Database Terintegrasi Negara Fiksi. Pantau Kekuatan, Stabilitas, dan Berita Dunia dalam Satu Dashboard.</p>
                <a href="https://chat.whatsapp.com/G7qDEaP0onWLlfDxVh1Bpl" class="flex items-center justify-center gap-3 p-4 glass border border-green-500/30 rounded-xl hover:bg-green-500/10 transition">
                    <img src="https://image2url.com/r2/default/images/1772618921440-6eb7e2ab-0478-4a6e-959a-6ed4b77c9ca2.png" class="w-8 h-8">
                    <span class="text-[10px] font-black text-white uppercase">Join community sekarang!</span>
                </a>
            </div>
        </div>
    </section>

    <section id="mil" class="tab-content">
        <div class="glass-card p-6 border-l-4 border-yellow-500">
            <h3 class="font-cyber text-[10px] text-yellow-500 mb-4 uppercase">Update Militer</h3>
            <input id="mNeg" type="text" placeholder="Nama Negara" class="mb-3">
            <input id="mFlag" type="file" accept="image/*" class="mb-3 text-[10px]">
            <div class="grid grid-cols-2 gap-2">
                <input id="mArmy" type="number" placeholder="Army">
                <input id="mNavy" type="number" placeholder="Navy">
                <input id="mAir" type="number" placeholder="Air Force">
                <input id="mNuke" type="number" placeholder="Nukes">
            </div>
            <button onclick="simpan('MILITER')" class="w-full bg-yellow-600 p-3 rounded-xl font-black text-[10px] uppercase mt-4">Submit</button>
        </div>
        <div id="milList" class="space-y-4"></div>
    </section>

    <section id="eco" class="tab-content">
        <div class="glass-card p-6 border-l-4 border-emerald-500">
            <h3 class="font-cyber text-[10px] text-emerald-500 mb-4 uppercase">Data Ekonomi</h3>
            <input id="eNeg" type="text" placeholder="Nama Negara" class="mb-3">
            <input id="eFlag" type="file" accept="image/*" class="mb-3 text-[10px]">
            <input id="eGdp" type="number" placeholder="GDP ($ Billion)" class="mb-3">
            <button onclick="simpan('EKONOMI')" class="w-full bg-emerald-600 p-3 rounded-xl font-black text-[10px] uppercase">Submit</button>
        </div>
        <div id="ecoList" class="space-y-3"></div>
    </section>

    <section id="poll" class="tab-content">
        <div class="glass-card p-6 border-l-4 border-purple-500">
            <input id="pQuest" type="text" placeholder="Topik Polling?" class="mb-3">
            <div class="grid grid-cols-2 gap-2"><input id="pOpt1" type="text" placeholder="Opsi A"><input id="pOpt2" type="text" placeholder="Opsi B"></div>
            <button onclick="simpan('POLL')" class="w-full bg-purple-600 p-3 rounded-xl font-black text-[10px] uppercase mt-4">Buka Suara</button>
        </div>
        <div id="pollList" class="space-y-4"></div>
    </section>

    <section id="news" class="tab-content">
        <div class="glass-card p-6 border-l-4 border-red-500">
            <input id="nNeg" type="text" placeholder="Negara" class="mb-3">
            <input id="nTitle" type="text" placeholder="Judul" class="mb-3">
            <textarea id="nBody" placeholder="Berita..." class="mb-3"></textarea>
            <input id="nImg" type="file" accept="image/*" class="mb-3 text-[10px]">
            <button onclick="simpan('BERITA')" class="w-full bg-red-600 p-3 rounded-xl font-black text-[10px] uppercase">Publish</button>
        </div>
        <div id="newsFeed" class="space-y-6"></div>
    </section>

    <section id="rules" class="tab-content">
        <div class="glass-card p-6 border-t-2 border-sky-500">
            <h2 class="font-cyber text-sky-400 text-sm mb-4 text-center uppercase">Aturan FSS</h2>
            <div class="text-[11px] text-slate-400 space-y-2">
                <p>1. Logis & IRL.</p><p>2. No Rasis.</p><p>3. Anti-spam War.</p>
            </div>
        </div>
    </section>

    <script>
        const API_URL = "https://65d63f04dc74654018aa7285.mockapi.io/fss/globaldata";
        
        function buka(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-nav');
            muatData();
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error);
        });

        async function muatData() {
            const res = await fetch(API_URL); const db = await res.json();
            // ... Logic render tetap sama (milList, ecoList, etc) ...
        }

        async function simpan(tipe) {
            let data = { t: tipe, unix: Date.now() };
            // ... Logic simpan Base64 tetap sama ...
            await fetch(API_URL, { method: 'POST', headers: {'content-type':'application/json'}, body: JSON.stringify(data) });
            location.reload();
        }

        window.onload = muatData;
    </script>
</body>
</html>
